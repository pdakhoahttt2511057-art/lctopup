<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-bg: #000000;
            --pixel-border: #ffffff;
            --pixel-accent: #00ff00; /* Màu xanh lá retro */
            --pixel-share: #00ffff;  /* Màu xanh cyan cho nút chia sẻ */
            --pixel-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
            image-rendering: pixelated;
        }

        body {
            background-color: var(--pixel-bg);
            color: var(--pixel-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            font-size: 10px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            border: 4px solid var(--pixel-border);
            padding: 20px;
            box-shadow: 10px 10px 0px #333;
            background-color: #111;
        }

        .section-label {
            margin-bottom: 15px;
            text-transform: uppercase;
            color: var(--pixel-accent);
            display: block;
            font-size: 8px;
        }

        /* Phần chiết khấu */
        .discount-area {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding: 10px;
            border: 2px dashed #444;
        }

        .discount-area input {
            background: #000;
            border: 2px solid var(--pixel-border);
            color: var(--pixel-accent);
            width: 80px;
            padding: 8px;
            text-align: center;
            font-family: inherit;
            font-size: 12px;
        }

        .btn-step {
            background: var(--pixel-border);
            border: none;
            color: #000;
            padding: 8px 12px;
            cursor: pointer;
        }

        /* Phần nhập số tiền tùy chỉnh */
        .custom-amount-area {
            margin-bottom: 20px;
        }

        .custom-amount-area input {
            width: 100%;
            background: #000;
            border: 2px solid var(--pixel-border);
            color: var(--pixel-text);
            padding: 12px;
            font-family: inherit;
            font-size: 12px;
            text-align: left;
        }

        .custom-amount-area input:focus {
            outline: none;
            border-color: var(--pixel-accent);
        }

        /* Lưới nút giá tiền */
        .grid-prices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .price-item {
            background: #222;
            border: 3px solid var(--pixel-border);
            color: var(--pixel-text);
            padding: 12px 5px;
            cursor: pointer;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .price-item.active {
            background: var(--pixel-accent);
            color: #000;
            border-color: #fff;
        }

        .old-price {
            font-size: 7px;
            text-decoration: line-through;
            opacity: 0.7;
        }

        .new-price {
            font-size: 10px;
        }

        /* Vùng hiển thị QR */
        .qr-area {
            text-align: center;
            border-top: 4px solid var(--pixel-border);
            padding-top: 20px;
        }

        #qrImage {
            max-width: 100%;
            border: 4px solid #fff;
            display: none;
            margin-bottom: 20px;
            background-color: white;
        }

        .placeholder {
            padding: 30px 10px;
            border: 2px dashed #444;
            color: #444;
            margin-bottom: 20px;
        }

        /* Nhóm nút hành động */
        .action-buttons {
            display: none; /* Ẩn cho đến khi chọn giá */
            flex-direction: column;
            gap: 15px;
        }

        .btn-action {
            width: 100%;
            border: none;
            padding: 15px;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 9px;
        }

        .btn-download {
            background: var(--pixel-accent);
            color: #000;
            box-shadow: 6px 6px 0px #006400;
        }

        .btn-share {
            background: var(--pixel-share);
            color: #000;
            box-shadow: 6px 6px 0px #008b8b;
        }

        .btn-action:active {
            box-shadow: 2px 2px 0px #333;
            transform: translate(4px, 4px);
        }
    </style>
</head>
<body>

<div class="container">
    <span class="section-label">Chiết khấu (%)</span>
    <div class="discount-area">
        <button class="btn-step" onclick="changeDiscount(-1)">-</button>
        <input type="number" id="discountInput" value="5" min="0" max="100" onchange="updateUI()">
        <button class="btn-step" onclick="changeDiscount(1)">+</button>
    </div>

    <span class="section-label">Nhập số tiền (VNĐ)</span>
    <div class="custom-amount-area">
        <input type="number" id="customAmountInput" placeholder="0" min="0" oninput="onCustomAmountChange()">
    </div>

    <span class="section-label">Hoặc chọn mệnh giá</span>
    <div class="grid-prices" id="priceGrid"></div>

    <div class="qr-area">
        <div id="qrPlaceholder" class="placeholder">CHỌN/NHẬP GIÁ ĐỂ LẤY QR</div>
        <img id="qrImage" src="" alt="Payment QR">
        
        <div class="action-buttons" id="actionGroup">
            <button class="btn-action btn-download" onclick="downloadQR()">TẢI QR XUỐNG</button>
            <button class="btn-action btn-share" onclick="shareQR()">CHIA SẺ</button>
        </div>
    </div>
</div>

<script>
    const BANK_ID = "timo"; // Đã sửa thành Timo
    const ACCOUNT_NO = "9021726031954"; // Đã sửa số tài khoản
    const ACCOUNT_NAME = encodeURIComponent("PHẠM ĐOÀN ANH KHOA");
    const CONTENT_TEXT = "zl 0382805094";
    const CONTENT_ENCODED = encodeURIComponent(CONTENT_TEXT);
    
    const BASE_AMOUNTS = [10000, 20000, 50000, 100000, 200000, 500000];
    let selectedAmount = 0;
    let finalAmountForQR = 0;

    function initPrices() {
        const grid = document.getElementById('priceGrid');
        grid.innerHTML = '';
        BASE_AMOUNTS.forEach(amount => {
            const div = document.createElement('div');
            div.className = 'price-item';
            div.id = `price-${amount}`;
            div.onclick = () => selectPrice(amount);
            grid.appendChild(div);
        });
        updateUI();
    }

    function formatNum(n) { return n.toLocaleString('vi-VN'); }

    function changeDiscount(delta) {
        let input = document.getElementById('discountInput');
        let val = parseInt(input.value) + delta;
        if (val < 0) val = 0; if (val > 100) val = 100;
        input.value = val;
        updateUI();
    }

    // Hàm gọi khi bấm vào các ô mệnh giá có sẵn
    function selectPrice(amount) {
        selectedAmount = amount;
        
        // Cập nhật giá trị vào ô nhập số
        document.getElementById('customAmountInput').value = amount;
        
        // Xóa class active của tất cả các ô, sau đó thêm vào ô được chọn
        document.querySelectorAll('.price-item').forEach(el => el.classList.remove('active'));
        const activeBtn = document.getElementById(`price-${amount}`);
        if(activeBtn) activeBtn.classList.add('active');
        
        updateUI();
    }

    // Hàm gọi khi tự nhập số tiền vào ô
    function onCustomAmountChange() {
        let val = parseInt(document.getElementById('customAmountInput').value);
        if (isNaN(val) || val < 0) {
            val = 0;
        }
        selectedAmount = val;

        // Bỏ active hết các ô tiền
        document.querySelectorAll('.price-item').forEach(el => el.classList.remove('active'));
        
        // Nếu số tiền nhập vào trùng khớp với một ô có sẵn thì highlight ô đó lên
        const activeBtn = document.getElementById(`price-${val}`);
        if(activeBtn) {
            activeBtn.classList.add('active');
        }

        updateUI();
    }

    function updateUI() {
        let discountPercent = parseFloat(document.getElementById('discountInput').value) || 0;
        
        // Cập nhật nhãn giá cho các ô cố định
        BASE_AMOUNTS.forEach(amount => {
            const btn = document.getElementById(`price-${amount}`);
            const discounted = Math.round(amount - (amount * discountPercent / 100));
            btn.innerHTML = `<span class="old-price">${formatNum(amount)}đ</span><span class="new-price">${formatNum(discounted)}đ</span>`;
        });

        // Xử lý tạo QR dựa trên selectedAmount hiện tại
        if (selectedAmount > 0) {
            finalAmountForQR = Math.round(selectedAmount - (selectedAmount * discountPercent / 100));
            showQR(finalAmountForQR);
        } else {
            // Ẩn QR nếu chưa chọn hoặc nhập 0
            document.getElementById('qrImage').style.display = 'none';
            document.getElementById('qrPlaceholder').style.display = 'block';
            document.getElementById('actionGroup').style.display = 'none';
        }
    }

    function showQR(amount) {
        const qrImg = document.getElementById('qrImage');
        const placeholder = document.getElementById('qrPlaceholder');
        const actionGroup = document.getElementById('actionGroup');
        const url = `https://img.vietqr.io/image/${BANK_ID}-${ACCOUNT_NO}-compact2.png?amount=${amount}&addInfo=${CONTENT_ENCODED}&accountName=${ACCOUNT_NAME}`;
        
        qrImg.src = url;
        qrImg.style.display = 'inline-block';
        placeholder.style.display = 'none';
        actionGroup.style.display = 'flex';
    }

    // Tải xuống
    async function downloadQR() {
        const qrImg = document.getElementById('qrImage');
        try {
            const response = await fetch(qrImg.src);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `QR_${finalAmountForQR}.png`;
            a.click();
        } catch (e) { alert("Lỗi tải ảnh!"); }
    }

    // Chia sẻ đến Zalo/Messenger/etc.
    async function shareQR() {
        const qrImg = document.getElementById('qrImage');
        if (!navigator.share) {
            alert("Trình duyệt của bạn không hỗ trợ tính năng chia sẻ nhanh.");
            return;
        }

        try {
            const response = await fetch(qrImg.src);
            const blob = await response.blob();
            const file = new File([blob], 'qr-thanh-toan.png', { type: blob.type });

            const shareData = {
                title: 'Thanh toán QR',
                text: `Chuyển khoản: ${formatNum(finalAmountForQR)}đ. Nội dung: ${CONTENT_TEXT}`,
                files: [file]
            };

            if (navigator.canShare && navigator.canShare(shareData)) {
                await navigator.share(shareData);
            } else {
                // Nếu không chia sẻ được file, chia sẻ text kèm link ảnh
                await navigator.share({
                    title: 'Thanh toán QR',
                    text: `Chuyển khoản: ${formatNum(finalAmountForQR)}đ. Nội dung: ${CONTENT_TEXT}`,
                    url: qrImg.src
                });
            }
        } catch (err) {
            console.log("Share error:", err);
            alert("Có lỗi khi thực hiện chia sẻ!");
        }
    }

    initPrices();
</script>

</body>
</html>
